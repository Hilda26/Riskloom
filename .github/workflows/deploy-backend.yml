name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/supabase/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    name: Push migrations + deploy Edge Functions
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: |
          for dir in backend/supabase/functions/*/; do
            name=$(basename "$dir")
            if [ "$name" = "_shared" ]; then continue; fi
            supabase functions deploy "$name" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify health endpoint
        run: |
          sleep 5
          curl -sf "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/health" | tee health.json
          python3 -c "import json,sys; d=json.load(open('health.json')); sys.exit(0 if d.get('status')=='healthy' else 1)"
